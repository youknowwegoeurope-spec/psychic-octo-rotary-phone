<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>해슐랭가이드 - 나만의 맛집 아카이브</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0816;
      --card-bg: rgba(26, 21, 44, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f0ff;
      --text-sub: #a5a1b8;
      
      /* MZ Hot Colors */
      --primary-gradient: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
      --secondary-gradient: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%);
      --accent-neon: #ff007f;
      --accent-cyan: #00f0ff;
      --star-color: #ffd166;
      --glass-glow: 0 8px 32px 0 rgba(121, 40, 202, 0.2);
      
      --font-outfit: 'Outfit', 'Noto Sans KR', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-outfit);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 0, 127, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }

    /* Glow Elements in Background */
    .bg-glow-1 {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: var(--accent-neon);
      filter: blur(150px);
      opacity: 0.15;
      top: -50px;
      left: -50px;
      pointer-events: none;
      z-index: -1;
    }

    .bg-glow-2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: var(--accent-cyan);
      filter: blur(180px);
      opacity: 0.12;
      bottom: -100px;
      right: -100px;
      pointer-events: none;
      z-index: -1;
    }

    header {
      padding: 2rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-emoji {
      font-size: 2rem;
      animation: bounce 2s infinite;
    }

    h1.logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .write-btn {
      background: var(--primary-gradient);
      border: none;
      color: white;
      padding: 0.8rem 1.6rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: var(--glass-glow);
    }

    .write-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 40px 0 rgba(255, 0, 127, 0.4);
    }

    .write-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 5rem 1rem;
    }

    /* Stats Dashboard */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .stat-icon {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .stat-icon.neon-pink {
      background: rgba(255, 0, 127, 0.15);
      color: var(--accent-neon);
      border: 1px solid rgba(255, 0, 127, 0.3);
    }

    .stat-icon.neon-blue {
      background: rgba(0, 240, 255, 0.15);
      color: var(--accent-cyan);
      border: 1px solid rgba(0, 240, 255, 0.3);
    }

    .stat-icon.neon-gold {
      background: rgba(255, 209, 102, 0.15);
      color: var(--star-color);
      border: 1px solid rgba(255, 209, 102, 0.3);
    }

    .stat-info h3 {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-bottom: 0.2rem;
      font-weight: 500;
    }

    .stat-info p {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
    }

    /* Filter & Control Section */
    .controls-section {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .search-filter-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 280px;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border-radius: 50px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-family: var(--font-outfit);
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .search-box input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.6;
    }

    .sort-select-wrapper {
      position: relative;
    }

    .sort-select {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 0.8rem 2rem 0.8rem 1.2rem;
      border-radius: 50px;
      color: var(--text-main);
      font-family: var(--font-outfit);
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
      appearance: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .sort-select:focus {
      border-color: var(--accent-neon);
    }

    .sort-select-wrapper::after {
      content: '▼';
      font-size: 0.65rem;
      color: var(--text-sub);
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Category Chips */
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding-bottom: 0.5rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-sub);
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .chip:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .chip.active {
      background: var(--secondary-gradient);
      color: #000;
      font-weight: 700;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
    }

    /* Restaurant Card Grid */
    .diary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .diary-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
    }

    .diary-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 0, 127, 0.3);
      box-shadow: 0 12px 30px rgba(121, 40, 202, 0.15);
    }

    .card-img-wrapper {
      position: relative;
      height: 220px;
      width: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #2b1f4d 0%, #150f29 100%);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .diary-card:hover .card-img {
      transform: scale(1.08);
    }

    .card-tag-region {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(11, 8, 22, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .card-rating-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(11, 8, 22, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--star-color);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .card-content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-meta-time {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .card-meta-time:hover {
      color: var(--accent-cyan);
    }

    .card-title-row {
      margin-bottom: 0.8rem;
    }

    .card-food-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.15rem;
      word-break: break-all;
    }

    .card-restaurant-name {
      font-size: 0.9rem;
      color: var(--text-sub);
      font-weight: 500;
      word-break: break-all;
    }

    .card-review-box {
      background: rgba(255, 255, 255, 0.03);
      border-left: 3px solid var(--accent-neon);
      padding: 0.8rem 1rem;
      border-radius: 0 12px 12px 0;
      margin-bottom: 1.5rem;
      flex-grow: 1;
    }

    .card-review-text {
      font-size: 0.95rem;
      line-height: 1.4;
      color: #e2dff0;
      font-style: italic;
      word-break: break-all;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1rem;
      margin-top: auto;
    }

    .card-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-sub);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.2s ease;
    }

    .card-btn.edit-btn:hover {
      background: rgba(0, 240, 255, 0.1);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .card-btn.delete-btn:hover {
      background: rgba(255, 0, 127, 0.1);
      border-color: var(--accent-neon);
      color: var(--accent-neon);
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 1rem;
      background: var(--card-bg);
      border: 2px dashed var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(12px);
    }

    .empty-emoji {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    .empty-state h3 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--text-sub);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .empty-state button {
      margin: 0 auto;
    }

    /* Modals (Glassmorphism Modal) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 3, 11, 0.8);
      backdrop-filter: blur(15px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 1rem;
      overflow-y: auto;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-container {
      background: rgba(22, 17, 39, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), var(--glass-glow);
      border-radius: 28px;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 800;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-sub);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .close-btn:hover {
      color: var(--accent-neon);
    }

    /* Form Styles */
    .modal-form {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .form-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.8rem 1rem;
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-outfit);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--accent-cyan);
      background: rgba(255, 255, 255, 0.08);
    }

    /* Region Selector inside Form */
    .region-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .region-radio {
      display: none;
    }

    .region-label {
      display: block;
      text-align: center;
      padding: 0.6rem 0.5rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-sub);
      transition: all 0.2s ease;
    }

    .region-radio:checked + .region-label {
      background: rgba(0, 240, 255, 0.15);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      font-weight: 700;
    }

    /* Star Rating System */
    .star-rating-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stars {
      display: flex;
      flex-direction: row-reverse; /* For CSS-based hover styling if wanted, or JS-based */
      justify-content: flex-end;
      gap: 0.3rem;
    }

    .star {
      font-size: 1.8rem;
      color: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .star.selected,
    .star.hovered {
      color: var(--star-color);
      text-shadow: 0 0 10px rgba(255, 209, 102, 0.5);
    }

    /* Zero Star Button */
    .zero-star-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-sub);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .zero-star-btn:hover {
      background: rgba(255, 0, 127, 0.1);
      border-color: var(--accent-neon);
      color: var(--accent-neon);
    }

    .zero-star-btn.selected {
      background: rgba(255, 0, 127, 0.2);
      border-color: var(--accent-neon);
      color: var(--accent-neon);
      box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
    }

    /* Image Upload Drag & Drop */
    .image-upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.02);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
    }

    .image-upload-area:hover {
      border-color: var(--accent-neon);
      background: rgba(255, 0, 127, 0.03);
    }

    .upload-icon {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .upload-text {
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    .upload-preview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .preview-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .image-upload-area:hover .preview-overlay {
      display: flex;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn-submit {
      flex: 1;
      background: var(--primary-gradient);
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--glass-glow);
      transition: all 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 0, 127, 0.35);
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-sub);
      padding: 0.9rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* Edit Time Modal Specifically */
    .time-edit-content {
      padding: 1.5rem;
    }

    /* Keyframes */
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 1.5rem 1rem;
      }
      h1.logo-text {
        font-size: 1.5rem;
      }
      .logo-emoji {
        font-size: 1.6rem;
      }
      .write-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
      .dashboard {
        grid-template-columns: 1fr;
      }
      .search-filter-row {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box {
        max-width: 100%;
      }
      .region-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- Fixed background ambient glowing blobs -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <span class="logo-emoji">🍽️</span>
      <h1 class="logo-text">해슐랭가이드</h1>
    </div>
    <button class="write-btn" id="openAddModalBtn">
      <span>해슐랭 식당 기록하기</span> ✨
    </button>

            <div>
              <input type="radio" name="formRegion" id="r_busan" value="부산" class="region-radio">
              <label for="r_busan" class="region-label">🌊 부산</label>
            </div>
            <div>
              <input type="radio" name="formRegion" id="r_jeju" value="제주" class="region-radio">
              <label for="r_jeju" class="region-label">🌴 제주</label>

  <!-- Quick Time Edit Modal -->
  <div class="modal-overlay" id="timeEditModal">
    <div class="modal-container" style="max-width: 400px;">

          <button type="button" class="btn-cancel" id="cancelTimeBtn">취소</button>

        </div>

  </div>

  <!-- JS Logic -->
  <script>
    // State management
    let db = [];
    let currentFilter = 'all';
    let currentSort = 'newest';
    let selectedRating = 3;
    let base64ImageData = "";

    // DOM Elements
    const recordModal = document.getElementById('recordModal');
    const timeEditModal = document.getElementById('timeEditModal');
    const recordForm = document.getElementById('recordForm');
    const diaryGrid = document.getElementById('diaryGrid');
    
    const openAddModalBtn = document.getElementById('openAddModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');
    
    const imageUploadArea = document.getElementById('imageUploadArea');
    const imageFileInput = document.getElementById('imageFileInput');
    const imagePreview = document.getElementById('imagePreview');
    const starContainer = document.getElementById('starContainer');
    const zeroStarBtn = document.getElementById('zeroStarBtn');
    const starText = document.getElementById('starText');
    const visitTimeInput = document.getElementById('visitTime');

    // Controls DOM
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const categoryChips = document.getElementById('categoryChips');

    // Stats DOM
    const totalCountEl = document.getElementById('totalCount');
    const favoriteRegionEl = document.getElementById('favoriteRegion');
    const avgRatingEl = document.getElementById('avgRating');

    // Quick Time Edit DOM
    const closeTimeModalBtn = document.getElementById('closeTimeModalBtn');
    const cancelTimeBtn = document.getElementById('cancelTimeBtn');
    const saveTimeBtn = document.getElementById('saveTimeBtn');
    const quickVisitTimeInput = document.getElementById('quickVisitTime');
    const timeEditItemIdInput = document.getElementById('timeEditItemId');

    // Initialize Page
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      setDefaultDateTime();
      setupStars();
      setupImageUpload();
      setupChips();
      renderDashboard();
      renderCards();
    });

    // Load from LocalStorage
    function loadData() {
      const savedData = localStorage.getItem('life_restaurants');
      if (savedData) {
        try {
          db = JSON.parse(savedData);
        } catch (e) {
          console.error('Failed to parse database', e);
          db = [];
        }
      }
    }

    // Save to LocalStorage
    function saveData() {
      localStorage.setItem('life_restaurants', JSON.stringify(db));
      renderDashboard();
      renderCards();
    }

    // Set Default Datetime Local to current KST
    function setDefaultDateTime() {
      const now = new Date();
      // adjust timezone offset to local time
      const offset = now.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
      visitTimeInput.value = localISOTime;
    }

    // Open/Close Add/Edit Modal
    openAddModalBtn.addEventListener('click', () => {
      resetForm();
      setDefaultDateTime();
      document.getElementById('modalTitle').textContent = '해슐랭가이드 기록하기';
      recordForm.querySelector('button[type="submit"]').textContent = '등록하기';
      recordModal.classList.add('active');
    });

    function closeRecordModal() {
      recordModal.classList.remove('active');
    }
    closeModalBtn.addEventListener('click', closeRecordModal);
    cancelFormBtn.addEventListener('click', closeRecordModal);

    // Reset Form fields
    function resetForm() {
      recordForm.reset();
      document.getElementById('editItemId').value = '';
      imagePreview.src = '';
      imagePreview.style.display = 'none';
      base64ImageData = '';
      selectedRating = 3;
      updateStarsUI(3);
    }

    // Star Rating Event Handlers
    function setupStars() {
      const stars = starContainer.querySelectorAll('.star');
      
      stars.forEach(star => {
        // click
        star.addEventListener('click', () => {
          selectedRating = parseInt(star.getAttribute('data-value'));
          updateStarsUI(selectedRating);
        });

        // hover
        star.addEventListener('mouseenter', () => {
          const hoverVal = parseInt(star.getAttribute('data-value'));
          highlightStars(hoverVal);
        });
      });

      starContainer.addEventListener('mouseleave', () => {
        highlightStars(selectedRating);
      });

      // 0-star button handlers
      zeroStarBtn.addEventListener('click', () => {
        selectedRating = 0;
        updateStarsUI(0);
      });

      zeroStarBtn.addEventListener('mouseenter', () => {
        highlightStars(0);
      });
    }

    function updateStarsUI(val) {
      highlightStars(val);
      let ratingKorean = '';
      switch(val) {
        case 3: ratingKorean = '3스타 - 요리가 매우 훌륭하여 특별한 여행을 떠날 가치가 있는 식당 🌟🌟🌟'; break;
        case 2: ratingKorean = '2스타 - 요리가 훌륭하여 멀리 찾아갈 만한 식당 ⭐⭐'; break;
        case 1: ratingKorean = '1스타 - 요리가 훌륭한 식당 ⭐'; break;
        case 0: ratingKorean = '0스타 - 다음에 가지 않을 식당 🚫'; break;
      }
      starText.textContent = ratingKorean;
    }

    function highlightStars(val) {
      const stars = starContainer.querySelectorAll('.star');
      stars.forEach(star => {
        const starVal = parseInt(star.getAttribute('data-value'));
        if (val > 0 && starVal <= val) {
          star.classList.add('selected');
        } else {
          star.classList.remove('selected');
        }
      });

      if (val === 0) {
        zeroStarBtn.classList.add('selected');
      } else {
        zeroStarBtn.classList.remove('selected');
      }
    }

    // Image Upload Logic (Compressing via Canvas)
    function setupImageUpload() {
      imageUploadArea.addEventListener('click', () => {
        imageFileInput.click();
      });

      // Drag over effects
      imageUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        imageUploadArea.style.borderColor = 'var(--accent-cyan)';
      });

      imageUploadArea.addEventListener('dragleave', () => {
        imageUploadArea.style.borderColor = 'rgba(255, 255, 255, 0.12)';
      });

      imageUploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        imageUploadArea.style.borderColor = 'rgba(255, 255, 255, 0.12)';
        
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          processImageFile(e.dataTransfer.files[0]);
        }
      });

      imageFileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
          processImageFile(e.target.files[0]);
        }
      });
    }

    function processImageFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 첨부할 수 있습니다.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          // Compress image using canvas
          const maxDim = 600;
          let width = img.width;
          let height = img.height;

          if (width > maxDim || height > maxDim) {
            if (width > height) {
              height = Math.round((height * maxDim) / width);
              width = maxDim;
            } else {
              width = Math.round((width * maxDim) / height);
              height = maxDim;
            }
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // Convert to base64
          base64ImageData = canvas.toDataURL('image/jpeg', 0.75);
          imagePreview.src = base64ImageData;
          imagePreview.style.display = 'block';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // Submit Form
    recordForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const editId = document.getElementById('editItemId').value;
      const foodName = document.getElementById('foodName').value.trim();
      const restaurantName = document.getElementById('restaurantName').value.trim();
      const oneLineReview = document.getElementById('oneLineReview').value.trim();
      const visitTime = document.getElementById('visitTime').value;
      
      const regionEl = document.querySelector('input[name="formRegion"]:checked');
      const region = regionEl ? regionEl.value : '기타';

      if (editId) {
        // Edit mode
        const index = db.findIndex(item => item.id === editId);
        if (index !== -1) {
          db[index].foodName = foodName;
          db[index].restaurantName = restaurantName;
          db[index].oneLineReview = oneLineReview;
          db[index].rating = selectedRating;
          db[index].visitTime = visitTime;
          db[index].region = region;
          // Only update image if new image was provided
          if (base64ImageData) {
            db[index].image = base64ImageData;
          }
        }
      } else {
        // Add mode
        const newItem = {
          id: Date.now().toString(),
          foodName,
          restaurantName,
          oneLineReview,
          rating: selectedRating,
          visitTime,
          region,
          image: base64ImageData || "", // optional
          createdAt: new Date().toISOString()
        };
        db.push(newItem);
      }

      saveData();
      closeRecordModal();
    });

    // Setup Filter Chips
    function setupChips() {
      const chips = categoryChips.querySelectorAll('.chip');
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentFilter = chip.getAttribute('data-region');
          renderCards();
        });
      });
    }

    // Search and Sort Event Listeners
    searchInput.addEventListener('input', renderCards);
    sortSelect.addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderCards();
    });

    // Statistics Dashboard Render
    function renderDashboard() {
      // Total count
      totalCountEl.textContent = `${db.length}개`;

      // Avg Rating
      if (db.length === 0) {
        avgRatingEl.textContent = '0.0 / 3.0';
        favoriteRegionEl.textContent = '없음';
        return;
      }

      const totalRating = db.reduce((sum, item) => sum + item.rating, 0);
      avgRatingEl.textContent = `${(totalRating / db.length).toFixed(1)} / 3.0`;

      // Favorite Region calculation
      const regionMap = {};
      db.forEach(item => {
        regionMap[item.region] = (regionMap[item.region] || 0) + 1;
      });

      let favRegion = '없음';
      let maxCount = 0;
      for (const [region, count] of Object.entries(regionMap)) {
        if (count > maxCount) {
          maxCount = count;
          favRegion = region;
        }
      }
      favoriteRegionEl.textContent = `${favRegion} (${maxCount}회)`;
    }

    // Render Cards in Grid
    function renderCards() {
      diaryGrid.innerHTML = '';

      // Filter
      let filtered = db.filter(item => {
        // Category Filter
        if (currentFilter !== 'all' && item.region !== currentFilter) {
          return false;
        }
        
        // Search Filter
        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          const matchFood = item.foodName.toLowerCase().includes(query);
          const matchRestaurant = item.restaurantName.toLowerCase().includes(query);
          const matchReview = item.oneLineReview.toLowerCase().includes(query);
          return matchFood || matchRestaurant || matchReview;
        }

        return true;
      });

      // Sort
      filtered.sort((a, b) => {
        if (currentSort === 'newest') {
          return new Date(b.createdAt) - new Date(a.createdAt);
        } else if (currentSort === 'rating') {
          if (b.rating !== a.rating) {
            return b.rating - a.rating;
          }
          return new Date(b.createdAt) - new Date(a.createdAt); // Secondary sort by date
        } else if (currentSort === 'visitDate') {
          return new Date(b.visitTime) - new Date(a.visitTime);
        }
        return 0;
      });

      // Render items
      if (filtered.length === 0) {
        diaryGrid.innerHTML = `
          <div class="empty-state">
            <span class="empty-emoji">🍕</span>
            <h3>기록된 맛집이 없습니다</h3>
            <p>오늘 먹은 맛있는 추억을 해슐랭가이드로 아카이빙 해보세요!</p>
            <button class="write-btn" onclick="openAddModalBtn.click()">첫 해슐랭 식당 기록하기 ✨</button>
          </div>
        `;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('article');
        card.className = 'diary-card';
        card.setAttribute('data-id', item.id);

        const formattedTime = formatDateTimeString(item.visitTime);

        // Fallback banner gradient if no image is present
        const hasImage = item.image && item.image.trim() !== "";
        const imageSrc = hasImage ? item.image : "";
        const imageHTML = hasImage 
          ? `<img src="${imageSrc}" alt="${item.foodName}" class="card-img">`
          : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b); color:rgba(255,255,255,0.7); font-size:3rem;">🍽️</div>`;

        const badgeColor = item.rating === 0 ? 'var(--text-sub)' : 'var(--star-color)';
        const badgeText = item.rating === 0 ? '🚫 0스타' : '★'.repeat(item.rating);

        card.innerHTML = `
          <div class="card-img-wrapper">
            ${imageHTML}
            <span class="card-tag-region">📍 ${item.region}</span>
            <span class="card-rating-badge" style="color: ${badgeColor};">${badgeText}</span>
          </div>
          <div class="card-content">
            <div class="card-meta-time" onclick="openTimeEditModal('${item.id}')" title="시간 클릭하여 간편 수정하기">
              <span>⏰</span> <span class="card-time-text">${formattedTime}</span> <span style="font-size:0.6rem; opacity:0.7;">(수정)</span>
            </div>
            <div class="card-title-row">
              <h2 class="card-food-name">${item.foodName}</h2>
              <div class="card-restaurant-name">${item.restaurantName}</div>
            </div>
            <div class="card-review-box">
              <p class="card-review-text">"${item.oneLineReview}"</p>
            </div>
            <div class="card-actions">
              <button class="card-btn edit-btn" onclick="editItem('${item.id}')">
                <span>✏️</span> 수정
              </button>
              <button class="card-btn delete-btn" onclick="deleteItem('${item.id}')">
                <span>🗑️</span> 삭제
              </button>
            </div>
          </div>
        `;

        diaryGrid.appendChild(card);
      });
    }

    // Helper: format YYYY-MM-DDTHH:MM to readable text
    function formatDateTimeString(str) {
      if (!str) return '';
      const parts = str.split('T');
      if (parts.length === 2) {
        return `${parts[0]} ${parts[1]}`;
      }
      return str;
    }

    // Delete Item
    window.deleteItem = function(id) {
      if (confirm('이 맛집 기록을 삭제하시겠습니까? 😢')) {
        db = db.filter(item => item.id !== id);
        saveData();
      }
    };

    // Edit Item (Populate Add/Edit Modal)
    window.editItem = function(id) {
      const item = db.find(item => item.id === id);
      if (!item) return;

      resetForm();
      
      document.getElementById('modalTitle').textContent = '해슐랭가이드 수정하기';
      recordForm.querySelector('button[type="submit"]').textContent = '수정완료';

      document.getElementById('editItemId').value = item.id;
      document.getElementById('foodName').value = item.foodName;
      document.getElementById('restaurantName').value = item.restaurantName;
      document.getElementById('oneLineReview').value = item.oneLineReview;
      document.getElementById('visitTime').value = item.visitTime;
      
      // Select Region Radio
      const radio = document.querySelector(`input[name="formRegion"][value="${item.region}"]`);
      if (radio) radio.checked = true;

      // Select Rating
      selectedRating = item.rating;
      updateStarsUI(item.rating);

      // Image preview
      if (item.image) {
        imagePreview.src = item.image;
        imagePreview.style.display = 'block';
      }

      recordModal.classList.add('active');
    };

    // Quick Time Edit Modal
    window.openTimeEditModal = function(id) {
      const item = db.find(item => item.id === id);
      if (!item) return;

      timeEditItemIdInput.value = item.id;
      quickVisitTimeInput.value = item.visitTime;
      timeEditModal.classList.add('active');
    };

    function closeTimeEditModal() {
      timeEditModal.classList.remove('active');
    }
    closeTimeModalBtn.addEventListener('click', closeTimeEditModal);
    cancelTimeBtn.addEventListener('click', closeTimeEditModal);

    saveTimeBtn.addEventListener('click', () => {
      const id = timeEditItemIdInput.value;
      const newTime = quickVisitTimeInput.value;

      if (!newTime) {
        alert('시간을 올바르게 지정해주세요.');
        return;
      }

      const index = db.findIndex(item => item.id === id);
      if (index !== -1) {
        db[index].visitTime = newTime;
        saveData();
      }
      closeTimeEditModal();
    });
  </script>
</body>
</html>
